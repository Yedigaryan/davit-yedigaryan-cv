# nginx config for serving the Next.js static export (`output: 'export'`).
# Drop this in /etc/nginx/sites-available/davit-yedigaryan-cv (or include from your main http {}).
# Adjust `server_name` and the `root` to match your deployment.

server {
    listen 80;
    listen [::]:80;
    server_name davit.yedigaryan.pro;

    # Path to the contents of `out/` (after `npm run build`).
    root /var/www/davit-yedigaryan-cv;
    index index.html;

    # Hashed Next.js assets — safe to cache aggressively.
    location /_next/static/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Static export emits flat *.html per route (about.html, skills.html, ...).
    # Try the request as a literal file, then with .html appended, then as a directory,
    # then fall back to index.html. This makes /skills, /skills/, /skills.html all work
    # and fixes the "refresh on a deep link returns home" bug.
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Custom 404 from the export.
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    # Reasonable defaults — gzip text assets, never cache HTML at the edge.
    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
